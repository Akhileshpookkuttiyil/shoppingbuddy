{% extends 'base.html' %}
{% block title %}Pay Online - ShoppingBuddy{% endblock %}
{% block content %}
<div class="max-w-md mx-auto py-12 px-4">
  <div class="bg-white p-8 border border-neutral-200 rounded-2xl shadow-sm text-center">
    <div class="animate-spin inline-block w-8 h-8 border-4 border-current border-t-transparent text-blue-600 rounded-full mb-4" role="status">
      <span class="sr-only">Loading...</span>
    </div>
    <h2 class="text-xl font-bold text-neutral-800 mb-2">Redirecting to Payment Gateway</h2>
    <p class="text-sm text-neutral-500">Please do not refresh or close this window...</p>
    <button id="pay-btn" class="mt-6 w-full btn-primary py-2.5 rounded-xl font-semibold">
      Pay Now ₹{{ order.total_amount }}
    </button>
  </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
  var options = {
    "key": "{{ razorpay_key_id }}",
    "amount": "{{ amount_in_paise }}",
    "currency": "INR",
    "name": "ShoppingBuddy",
    "description": "Payment for Order {{ order.order_number }}",
    "image": "https://img.icons8.com/color/96/shopping-bag.png",
    "order_id": "{{ order.razorpay_order_id }}",
    "handler": function (response){
      var form = document.createElement('form');
      form.method = 'POST';
      form.action = "{% url 'payments:verify_payment' %}";
      
      var csrfInput = document.createElement('input');
      csrfInput.type = 'hidden';
      csrfInput.name = 'csrfmiddlewaretoken';
      csrfInput.value = '{{ csrf_token }}';
      form.appendChild(csrfInput);

      var orderIdInput = document.createElement('input');
      orderIdInput.type = 'hidden';
      orderIdInput.name = 'razorpay_order_id';
      orderIdInput.value = response.razorpay_order_id;
      form.appendChild(orderIdInput);

      var paymentIdInput = document.createElement('input');
      paymentIdInput.type = 'hidden';
      paymentIdInput.name = 'razorpay_payment_id';
      paymentIdInput.value = response.razorpay_payment_id;
      form.appendChild(paymentIdInput);

      var signatureInput = document.createElement('input');
      signatureInput.type = 'hidden';
      signatureInput.name = 'razorpay_signature';
      signatureInput.value = response.razorpay_signature;
      form.appendChild(signatureInput);

      document.body.appendChild(form);
      form.submit();
    },
    "prefill": {
      "name": "{{ order.shipping_full_name }}",
      "email": "{{ order.user.email }}",
      "contact": "{{ order.shipping_phone }}"
    },
    "theme": {
      "color": "#2563EB"
    },
    "modal": {
      "ondismiss": function() {
        window.location.href = "{% url 'payments:payment_cancel' order.id %}";
      }
    }
  };
  var rzp = new Razorpay(options);
  document.getElementById('pay-btn').onclick = function(e){
    rzp.open();
    e.preventDefault();
  }
  window.onload = function() {
    rzp.open();
  }
</script>
{% endblock %}
