<!-- Product Skeleton -->
<article class="flex flex-col overflow-hidden h-full rounded-2xl border border-neutral-100 bg-white">
  <!-- Image Area Skeleton -->
  <div class="relative block w-full aspect-square bg-neutral-100 animate-pulse"></div>

  <!-- Content Skeleton -->
  <div class="flex flex-col flex-grow p-4 border-t border-neutral-100">
    
    <!-- Category Skeleton -->
    <div class="h-3 w-1/3 bg-neutral-200 rounded animate-pulse mb-3"></div>

    <!-- Title Skeleton -->
    <div class="space-y-2 mb-4">
      <div class="h-4 w-full bg-neutral-200 rounded animate-pulse"></div>
      <div class="h-4 w-2/3 bg-neutral-200 rounded animate-pulse"></div>
    </div>

    <!-- Price + Actions Skeleton -->
    <div class="mt-auto flex items-center justify-between gap-2">
      <!-- Price -->
      <div class="h-5 w-1/4 bg-neutral-200 rounded animate-pulse"></div>

      <!-- Actions -->
      <div class="flex items-center gap-2">
        <div class="h-8 w-8 bg-neutral-200 rounded-lg animate-pulse"></div>
        <div class="h-8 w-8 bg-neutral-200 rounded-lg animate-pulse"></div>
      </div>
    </div>

  </div>
</article>
