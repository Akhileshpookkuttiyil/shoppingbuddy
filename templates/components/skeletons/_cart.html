<!-- Cart Item Skeleton -->
<div class="py-6 flex flex-col sm:flex-row gap-6 border-b border-neutral-200 last:border-0">
  
  <!-- Image Skeleton -->
  <div class="flex-shrink-0 w-24 h-24 sm:w-28 sm:h-28 bg-neutral-100 rounded-lg animate-pulse"></div>
  
  <!-- Details & Controls Skeleton -->
  <div class="flex-grow flex flex-col justify-between">
    <div class="flex justify-between items-start gap-4">
      <div class="w-full">
        <!-- Category -->
        <div class="h-3 w-1/4 bg-neutral-200 rounded animate-pulse mb-2"></div>
        <!-- Title -->
        <div class="h-4 w-3/4 bg-neutral-200 rounded animate-pulse mb-2"></div>
        <!-- Price -->
        <div class="h-4 w-1/4 bg-neutral-200 rounded animate-pulse mt-2"></div>
      </div>
      
      <!-- Trash icon skeleton -->
      <div class="w-5 h-5 bg-neutral-200 rounded animate-pulse"></div>
    </div>
    
    <div class="flex items-center justify-between mt-4">
      
      <!-- Quantity Controls Skeleton -->
      <div class="w-24 h-8 bg-neutral-200 rounded-lg animate-pulse"></div>
      
      <!-- Line Total Skeleton -->
      <div class="flex flex-col items-end gap-1">
        <div class="h-3 w-12 bg-neutral-200 rounded animate-pulse"></div>
        <div class="h-5 w-20 bg-neutral-200 rounded animate-pulse"></div>
      </div>
      
    </div>
  </div>
  
</div>
