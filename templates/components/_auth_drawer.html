<div x-data x-show="$store.auth.isOpen" style="display: none;" class="relative z-[100]" aria-labelledby="slide-over-title" role="dialog" aria-modal="true">
  
  <!-- Backdrop (Dim and Blur) -->
  <div x-show="$store.auth.isOpen" 
       x-transition:enter="ease-out duration-500" 
       x-transition:enter-start="opacity-0 backdrop-blur-none" 
       x-transition:enter-end="opacity-100 backdrop-blur-[8px]" 
       x-transition:leave="ease-in duration-300" 
       x-transition:leave-start="opacity-100 backdrop-blur-[8px]" 
       x-transition:leave-end="opacity-0 backdrop-blur-none" 
       class="fixed inset-0 bg-neutral-900/40 backdrop-blur-[8px] transition-all" 
       @click="$store.auth.close()"></div>

  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute inset-0 overflow-hidden">
      <!-- Right Drawer Alignment -->
      <div class="pointer-events-none fixed inset-y-0 right-0 flex max-w-full sm:pl-10">
        
        <!-- Premium Drawer Panel -->
        <div x-show="$store.auth.isOpen" 
             @click.away="$store.auth.close()"
             x-transition:enter="transform transition ease-out duration-500" 
             x-transition:enter-start="translate-x-full" 
             x-transition:enter-end="translate-x-0" 
             x-transition:leave="transform transition ease-in duration-400" 
             x-transition:leave-start="translate-x-0" 
             x-transition:leave-end="translate-x-full" 
             class="pointer-events-auto w-screen max-w-[580px] h-[100dvh] bg-white shadow-[0_0_60px_-15px_rgba(0,0,0,0.2)] border-l border-neutral-200/50 flex flex-col relative overflow-hidden">
          
          <!-- Floating Close Button -->
          <div class="absolute top-5 right-5 z-20">
            <button @click="$store.auth.close()" type="button" class="w-9 h-9 flex items-center justify-center rounded-full bg-black/20 backdrop-blur-md text-white hover:bg-black/40 transition-colors focus:outline-none focus:ring-2 focus:ring-white/50 shadow-lg border border-white/10">
              <span class="sr-only">Close panel</span>
              <i data-lucide="x" class="w-4 h-4"></i>
            </button>
          </div>

          <!-- Hero Artwork Section (Premium Brand Experience) -->
          <div class="relative h-[200px] w-full shrink-0 overflow-hidden bg-neutral-900 flex items-center justify-center p-8">
            <!-- Sophisticated CSS Gradient Mesh instead of stock photo -->
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_20%_30%,_rgba(37,99,235,0.4)_0%,_transparent_40%),radial-gradient(circle_at_80%_80%,_rgba(79,70,229,0.3)_0%,_transparent_50%)]"></div>
            <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjQiIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iMC4wNSIvPjwvc3ZnPg==')] opacity-30"></div>
            
            <div class="relative z-10 flex flex-col items-center text-center">
              <div class="w-12 h-12 bg-white/10 backdrop-blur-md rounded-xl flex items-center justify-center shadow-xl border border-white/20 mb-3">
                <i data-lucide="shopping-bag" class="w-6 h-6 text-white"></i>
              </div>
              <h2 class="text-3xl font-bold text-white tracking-tight" x-text="$store.auth.activeTab === 'login' ? 'Welcome back' : 'Create your account'"></h2>
              <p class="text-white/70 text-sm mt-1" x-text="$store.auth.activeTab === 'login' ? 'Sign in to access your saved items and past orders.' : 'Join us to start your premium shopping experience.'"></p>
            </div>
          </div>

          <!-- Main Scrollable Content -->
          <div class="flex-1 overflow-y-auto relative no-scrollbar bg-white">
            <div class="px-8 lg:px-12 py-8 flex flex-col min-h-full">
              
              <!-- Animated Tab Switcher -->
              <div class="relative flex border-b border-neutral-100 mb-8" x-data="{
                  get activeIndex() { return $store.auth.activeTab === 'login' ? 0 : 1; }
              }">
                <button @click="$store.auth.switchTab('login')" class="flex-1 pb-4 text-center text-sm font-semibold transition-colors focus:outline-none" :class="$store.auth.activeTab === 'login' ? 'text-neutral-900' : 'text-neutral-400 hover:text-neutral-600'">
                  Sign In
                </button>
                <button @click="$store.auth.switchTab('register')" class="flex-1 pb-4 text-center text-sm font-semibold transition-colors focus:outline-none" :class="$store.auth.activeTab === 'register' ? 'text-neutral-900' : 'text-neutral-400 hover:text-neutral-600'">
                  Create Account
                </button>
                <!-- Animated Underline -->
                <div class="absolute bottom-0 h-0.5 bg-neutral-900 w-1/2 transition-transform duration-300 ease-out origin-left" :style="`transform: translateX(${activeIndex * 100}%)`"></div>
              </div>

              {% csrf_token %}
              
              <!-- Login Form -->
              <form x-show="$store.auth.activeTab === 'login'" 
                    x-transition:enter="transition ease-out duration-300 delay-150" 
                    x-transition:enter-start="opacity-0 translate-x-4" 
                    x-transition:enter-end="opacity-100 translate-x-0" 
                    @submit.prevent="$store.auth.submitLogin($event)" 
                    class="flex flex-col gap-6">
                
                <div class="flex flex-col gap-2 group">
                  <label class="text-sm font-medium text-neutral-700">Email Address</label>
                  <div class="relative flex items-center">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400 group-focus-within:text-neutral-900 transition-colors">
                      <i data-lucide="mail" class="w-5 h-5"></i>
                    </div>
                    <input type="text" x-model="$store.auth.formData.login.username" required placeholder="Enter your email" class="w-full rounded-xl border border-neutral-200 bg-neutral-50/50 px-4 py-4 text-base text-neutral-900 font-medium placeholder:text-neutral-400 focus:bg-white focus:border-neutral-900 focus:outline-none focus:ring-4 focus:ring-neutral-900/5 transition-all duration-200 pl-12" :class="{'border-red-500 focus:border-red-500 focus:ring-red-500/10 bg-red-50/20': $store.auth.errors.username}">
                  </div>
                  <template x-if="$store.auth.errors.username">
                    <div class="text-sm font-medium text-red-500 flex items-center gap-1.5 mt-0.5 animate-in fade-in">
                      <i data-lucide="alert-circle" class="w-4 h-4"></i>
                      <span x-text="$store.auth.errors.username[0]"></span>
                    </div>
                  </template>
                </div>

                <div class="flex flex-col gap-2 group" x-data="{ show: false }">
                  <div class="flex items-center justify-between">
                    <label class="text-sm font-medium text-neutral-700">Password</label>
                    <a href="#" class="text-sm font-medium text-neutral-500 hover:text-neutral-900 hover:underline transition-colors focus:outline-none">Forgot?</a>
                  </div>
                  <div class="relative flex items-center">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400 group-focus-within:text-neutral-900 transition-colors">
                      <i data-lucide="lock" class="w-5 h-5"></i>
                    </div>
                    <input :type="show ? 'text' : 'password'" x-model="$store.auth.formData.login.password" required placeholder="Enter your password" class="w-full rounded-xl border border-neutral-200 bg-neutral-50/50 px-4 py-4 text-base text-neutral-900 font-medium placeholder:text-neutral-400 focus:bg-white focus:border-neutral-900 focus:outline-none focus:ring-4 focus:ring-neutral-900/5 transition-all duration-200 pl-12 pr-12" :class="{'border-red-500 focus:border-red-500 focus:ring-red-500/10 bg-red-50/20': $store.auth.errors.password}">
                    <button type="button" @click="show = !show" class="absolute inset-y-0 right-0 pr-4 flex items-center text-neutral-400 hover:text-neutral-900 focus:outline-none transition-colors" title="Toggle password visibility">
                      <i data-lucide="eye" class="w-5 h-5" x-show="!show"></i>
                      <i data-lucide="eye-off" class="w-5 h-5" x-show="show" style="display: none;"></i>
                    </button>
                  </div>
                  <template x-if="$store.auth.errors.password">
                    <div class="text-sm font-medium text-red-500 flex items-center gap-1.5 mt-0.5 animate-in fade-in">
                      <i data-lucide="alert-circle" class="w-4 h-4"></i>
                      <span x-text="$store.auth.errors.password[0]"></span>
                    </div>
                  </template>
                </div>

                <label class="flex items-center gap-3 cursor-pointer group w-max">
                  <div class="relative flex items-center justify-center">
                    <input type="checkbox" x-model="$store.auth.formData.login.remember" class="peer w-5 h-5 appearance-none border-2 border-neutral-300 rounded-md checked:bg-neutral-900 checked:border-neutral-900 focus:ring-2 focus:ring-neutral-900/20 focus:outline-none transition-all cursor-pointer">
                    <i data-lucide="check" class="absolute w-3.5 h-3.5 text-white opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity"></i>
                  </div>
                  <span class="text-sm font-medium text-neutral-600 group-hover:text-neutral-900 transition-colors">Remember me for 30 days</span>
                </label>

                <button type="submit" class="w-full mt-2 py-4 px-4 bg-neutral-900 hover:bg-neutral-800 text-white rounded-xl font-semibold shadow-[0_4px_14px_0_rgba(0,0,0,0.1)] hover:shadow-[0_6px_20px_rgba(0,0,0,0.15)] hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-neutral-900/20 focus:ring-offset-2 transition-all relative overflow-hidden group flex items-center justify-center" :disabled="$store.auth.isSubmitting">
                  <span :class="{'opacity-0': $store.auth.isSubmitting}" class="flex items-center gap-2 transition-opacity">
                    Sign In
                    <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                  </span>
                  <span x-show="$store.auth.isSubmitting" class="absolute inset-0 flex items-center justify-center" style="display: none;">
                    <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>
                  </span>
                </button>
              </form>

              <!-- Register Form -->
              <form x-show="$store.auth.activeTab === 'register'" 
                    x-transition:enter="transition ease-out duration-300 delay-150" 
                    x-transition:enter-start="opacity-0 -translate-x-4" 
                    x-transition:enter-end="opacity-100 translate-x-0" 
                    @submit.prevent="$store.auth.submitRegister($event)" 
                    class="flex flex-col gap-6" style="display:none;">
                
                <div class="grid grid-cols-2 gap-4">
                  <div class="flex flex-col gap-2 group">
                    <label class="text-sm font-medium text-neutral-700">First Name</label>
                    <div class="relative flex items-center">
                      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400 group-focus-within:text-neutral-900 transition-colors">
                        <i data-lucide="user" class="w-4 h-4"></i>
                      </div>
                      <input type="text" x-model="$store.auth.formData.register.first_name" required placeholder="First" class="w-full rounded-xl border border-neutral-200 bg-neutral-50/50 px-4 py-3.5 text-base text-neutral-900 font-medium placeholder:text-neutral-400 focus:bg-white focus:border-neutral-900 focus:outline-none focus:ring-4 focus:ring-neutral-900/5 transition-all duration-200 pl-10" :class="{'border-red-500 focus:border-red-500 bg-red-50/20': $store.auth.errors.first_name}">
                    </div>
                    <template x-if="$store.auth.errors.first_name">
                      <div class="text-xs font-medium text-red-500 mt-1">
                        <span x-text="$store.auth.errors.first_name[0]"></span>
                      </div>
                    </template>
                  </div>
                  
                  <div class="flex flex-col gap-2 group">
                    <label class="text-sm font-medium text-neutral-700">Last Name</label>
                    <div class="relative flex items-center">
                      <input type="text" x-model="$store.auth.formData.register.last_name" required placeholder="Last" class="w-full rounded-xl border border-neutral-200 bg-neutral-50/50 px-4 py-3.5 text-base text-neutral-900 font-medium placeholder:text-neutral-400 focus:bg-white focus:border-neutral-900 focus:outline-none focus:ring-4 focus:ring-neutral-900/5 transition-all duration-200" :class="{'border-red-500 focus:border-red-500 bg-red-50/20': $store.auth.errors.last_name}">
                    </div>
                    <template x-if="$store.auth.errors.last_name">
                      <div class="text-xs font-medium text-red-500 mt-1">
                        <span x-text="$store.auth.errors.last_name[0]"></span>
                      </div>
                    </template>
                  </div>
                </div>

                <div class="flex flex-col gap-2 group">
                  <label class="text-sm font-medium text-neutral-700">Email Address</label>
                  <div class="relative flex items-center">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400 group-focus-within:text-neutral-900 transition-colors">
                      <i data-lucide="mail" class="w-5 h-5"></i>
                    </div>
                    <input type="email" x-model="$store.auth.formData.register.email" required placeholder="name@example.com" class="w-full rounded-xl border border-neutral-200 bg-neutral-50/50 px-4 py-4 text-base text-neutral-900 font-medium placeholder:text-neutral-400 focus:bg-white focus:border-neutral-900 focus:outline-none focus:ring-4 focus:ring-neutral-900/5 transition-all duration-200 pl-12" :class="{'border-red-500 focus:border-red-500 focus:ring-red-500/10 bg-red-50/20': $store.auth.errors.username || $store.auth.errors.email}">
                  </div>
                  <template x-if="$store.auth.errors.username || $store.auth.errors.email">
                    <div class="text-sm font-medium text-red-500 flex items-center gap-1.5 mt-0.5 animate-in fade-in">
                      <i data-lucide="alert-circle" class="w-4 h-4"></i>
                      <span x-text="$store.auth.errors.username ? $store.auth.errors.username[0] : $store.auth.errors.email[0]"></span>
                    </div>
                  </template>
                </div>

                <div class="flex flex-col gap-2 group" x-data="{ show: false }">
                  <label class="text-sm font-medium text-neutral-700">Password</label>
                  <div class="relative flex items-center">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400 group-focus-within:text-neutral-900 transition-colors">
                      <i data-lucide="lock" class="w-5 h-5"></i>
                    </div>
                    <input :type="show ? 'text' : 'password'" x-model="$store.auth.formData.register.password" required placeholder="Create a strong password" class="w-full rounded-xl border border-neutral-200 bg-neutral-50/50 px-4 py-4 text-base text-neutral-900 font-medium placeholder:text-neutral-400 focus:bg-white focus:border-neutral-900 focus:outline-none focus:ring-4 focus:ring-neutral-900/5 transition-all duration-200 pl-12 pr-12" :class="{'border-red-500 focus:border-red-500 focus:ring-red-500/10 bg-red-50/20': $store.auth.errors.password1}">
                    <button type="button" @click="show = !show" class="absolute inset-y-0 right-0 pr-4 flex items-center text-neutral-400 hover:text-neutral-900 focus:outline-none transition-colors" title="Toggle password visibility">
                      <i data-lucide="eye" class="w-5 h-5" x-show="!show"></i>
                      <i data-lucide="eye-off" class="w-5 h-5" x-show="show" style="display: none;"></i>
                    </button>
                  </div>
                  <template x-if="$store.auth.errors.password1">
                    <div class="text-sm font-medium text-red-500 flex items-center gap-1.5 mt-0.5 animate-in fade-in">
                      <i data-lucide="alert-circle" class="w-4 h-4"></i>
                      <span x-text="$store.auth.errors.password1[0]"></span>
                    </div>
                  </template>
                  
                  <!-- Premium Password Strength Meter -->
                  <div class="mt-2" x-show="$store.auth.formData.register.password.length > 0" x-collapse>
                    <div class="flex gap-1.5 h-1.5 w-full mb-3">
                      <div class="flex-1 rounded-full transition-all duration-500" :class="$store.auth.hasMinLength ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-neutral-200'"></div>
                      <div class="flex-1 rounded-full transition-all duration-500 delay-75" :class="($store.auth.hasMinLength && $store.auth.hasUpper) ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-neutral-200'"></div>
                      <div class="flex-1 rounded-full transition-all duration-500 delay-150" :class="($store.auth.hasMinLength && $store.auth.hasUpper && $store.auth.hasNumber) ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-neutral-200'"></div>
                      <div class="flex-1 rounded-full transition-all duration-500 delay-200" :class="($store.auth.hasMinLength && $store.auth.hasUpper && $store.auth.hasNumber && $store.auth.hasSpecial) ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-neutral-200'"></div>
                    </div>
                  </div>
                </div>

                <div class="flex flex-col gap-2 group" x-data="{ show: false }">
                  <label class="text-sm font-medium text-neutral-700">Confirm Password</label>
                  <div class="relative flex items-center">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400 group-focus-within:text-neutral-900 transition-colors">
                      <i data-lucide="lock" class="w-5 h-5"></i>
                    </div>
                    <input :type="show ? 'text' : 'password'" x-model="$store.auth.formData.register.confirm_password" required placeholder="Confirm your password" class="w-full rounded-xl border border-neutral-200 bg-neutral-50/50 px-4 py-4 text-base text-neutral-900 font-medium placeholder:text-neutral-400 focus:bg-white focus:border-neutral-900 focus:outline-none focus:ring-4 focus:ring-neutral-900/5 transition-all duration-200 pl-12 pr-12" :class="{'border-red-500 focus:border-red-500 focus:ring-red-500/10 bg-red-50/20': $store.auth.errors.password2}">
                    <button type="button" @click="show = !show" class="absolute inset-y-0 right-0 pr-4 flex items-center text-neutral-400 hover:text-neutral-900 focus:outline-none transition-colors" title="Toggle password visibility">
                      <i data-lucide="eye" class="w-5 h-5" x-show="!show"></i>
                      <i data-lucide="eye-off" class="w-5 h-5" x-show="show" style="display: none;"></i>
                    </button>
                    <!-- Success indicator icon -->
                    <div class="absolute inset-y-0 right-10 pr-2 flex items-center pointer-events-none transition-opacity" x-show="$store.auth.passwordsMatch" style="display: none;">
                       <i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-500"></i>
                    </div>
                  </div>
                  <template x-if="$store.auth.errors.password2">
                    <div class="text-sm font-medium text-red-500 flex items-center gap-1.5 mt-0.5 animate-in fade-in">
                      <i data-lucide="alert-circle" class="w-4 h-4"></i>
                      <span x-text="$store.auth.errors.password2[0]"></span>
                    </div>
                  </template>
                </div>

                <div class="flex items-start gap-3 mt-1">
                  <div class="flex items-center justify-center mt-0.5 shrink-0">
                    <input type="checkbox" required class="peer w-5 h-5 appearance-none border-2 border-neutral-300 rounded-md checked:bg-neutral-900 checked:border-neutral-900 focus:ring-2 focus:ring-neutral-900/20 focus:outline-none transition-all cursor-pointer">
                    <i data-lucide="check" class="absolute w-3.5 h-3.5 text-white opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity"></i>
                  </div>
                  <label class="text-sm text-neutral-600 leading-relaxed cursor-pointer">
                    By creating an account, you agree to our <a href="#" class="font-medium text-neutral-900 hover:underline">Terms of Service</a> and <a href="#" class="font-medium text-neutral-900 hover:underline">Privacy Policy</a>.
                  </label>
                </div>

                <button type="submit" class="w-full mt-2 py-4 px-4 bg-neutral-900 hover:bg-neutral-800 text-white rounded-xl font-semibold shadow-[0_4px_14px_0_rgba(0,0,0,0.1)] hover:shadow-[0_6px_20px_rgba(0,0,0,0.15)] hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-neutral-900/20 focus:ring-offset-2 transition-all relative overflow-hidden group flex items-center justify-center" :disabled="$store.auth.isSubmitting">
                  <span :class="{'opacity-0': $store.auth.isSubmitting}" class="flex items-center gap-2 transition-opacity">
                    Create Account
                    <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                  </span>
                  <span x-show="$store.auth.isSubmitting" class="absolute inset-0 flex items-center justify-center" style="display: none;">
                    <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>
                  </span>
                </button>
              </form>

              <!-- Authentication Benefits / Trust Indicators -->
              <div class="mt-auto pt-10 pb-4">
                <div class="grid grid-cols-2 gap-y-4 gap-x-2 text-sm text-neutral-500 font-medium border-t border-neutral-100 pt-8">
                  <div class="flex items-center gap-2">
                    <div class="w-6 h-6 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center shrink-0">
                      <i data-lucide="shield-check" class="w-3.5 h-3.5"></i>
                    </div>
                    Secure checkout
                  </div>
                  <div class="flex items-center gap-2">
                    <div class="w-6 h-6 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center shrink-0">
                      <i data-lucide="heart" class="w-3.5 h-3.5"></i>
                    </div>
                    Save your wishlist
                  </div>
                  <div class="flex items-center gap-2">
                    <div class="w-6 h-6 rounded-full bg-purple-50 text-purple-600 flex items-center justify-center shrink-0">
                      <i data-lucide="zap" class="w-3.5 h-3.5"></i>
                    </div>
                    Faster ordering
                  </div>
                  <div class="flex items-center gap-2">
                    <div class="w-6 h-6 rounded-full bg-amber-50 text-amber-600 flex items-center justify-center shrink-0">
                      <i data-lucide="package" class="w-3.5 h-3.5"></i>
                    </div>
                    Track purchases
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  /* Custom scrollbar for the drawer to ensure it looks premium */
  .no-scrollbar::-webkit-scrollbar {
    width: 6px;
  }
  .no-scrollbar::-webkit-scrollbar-track {
    background: transparent;
  }
  .no-scrollbar::-webkit-scrollbar-thumb {
    background-color: #e5e5e5;
    border-radius: 20px;
  }
</style>

<script>
  document.addEventListener('alpine:init', () => {
    Alpine.store('auth', {
      isOpen: false,
      activeTab: 'login',
      isSubmitting: false,
      errors: {},
      triggerElement: null,
      pendingAction: null,
      formData: {
        login: { username: '', password: '', remember: false },
        register: { first_name: '', last_name: '', email: '', password: '', confirm_password: '' }
      },
      
      get hasMinLength() { return this.formData.register.password.length >= 8; },
      get hasUpper() { return /[A-Z]/.test(this.formData.register.password); },
      get hasNumber() { return /[0-9]/.test(this.formData.register.password); },
      get hasSpecial() { return /[^A-Za-z0-9]/.test(this.formData.register.password); },
      get passwordsMatch() { return this.formData.register.password === this.formData.register.confirm_password && this.formData.register.confirm_password.length > 0; },
      
      open(tab = 'login', action = null) {
        this.activeTab = tab;
        this.pendingAction = action;
        this.triggerElement = document.activeElement;
        this.isOpen = true;
        document.body.style.overflow = 'hidden';
      },
      
      close() {
        this.isOpen = false;
        document.body.style.overflow = '';
        if (this.triggerElement) {
          this.triggerElement.focus();
        }
      },
      
      switchTab(tab) {
        this.activeTab = tab;
      },
      
      async submitLogin(e) {
        this.isSubmitting = true;
        this.errors = {};
        
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        const formData = new FormData();
        formData.append('username', this.formData.login.username);
        formData.append('password', this.formData.login.password);
        formData.append('csrfmiddlewaretoken', csrfToken);
        
        try {
          const res = await fetch('{% url "login" %}', {
            method: 'POST',
            body: formData,
            headers: {
              'X-Requested-With': 'XMLHttpRequest',
              'Accept': 'application/json'
            }
          });
          const data = await res.json();
          if (data.success) {
            window.toast.success("Successfully logged in!");
            this.resumePendingAction();
            this.close();
            if (!this.pendingAction) {
                setTimeout(() => window.location.reload(), 500);
            }
          } else {
            this.errors = data.errors || {};
            if (this.errors.__all__) {
                window.toast.error(this.errors.__all__[0]);
            }
          }
        } catch(e) {
          window.toast.error("Something went wrong. Please try again.");
        } finally {
          this.isSubmitting = false;
        }
      },
      
      async submitRegister(e) {
        this.isSubmitting = true;
        this.errors = {};
        
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        const formData = new FormData();
        formData.append('first_name', this.formData.register.first_name);
        formData.append('last_name', this.formData.register.last_name);
        formData.append('email', this.formData.register.email);
        formData.append('username', this.formData.register.email); 
        formData.append('password1', this.formData.register.password);
        formData.append('password2', this.formData.register.confirm_password);
        formData.append('csrfmiddlewaretoken', csrfToken);
        
        try {
          const res = await fetch('{% url "register" %}', {
            method: 'POST',
            body: formData,
            headers: {
              'X-Requested-With': 'XMLHttpRequest',
              'Accept': 'application/json'
            }
          });
          const data = await res.json();
          if (data.success) {
            window.toast.success("Account created successfully!");
            this.resumePendingAction();
            this.close();
            if (!this.pendingAction) {
                setTimeout(() => window.location.reload(), 500);
            }
          } else {
            this.errors = data.errors || {};
          }
        } catch(e) {
          window.toast.error("Something went wrong. Please try again.");
        } finally {
          this.isSubmitting = false;
        }
      },
      
      resumePendingAction() {
        if (!this.pendingAction) return;
        if (this.pendingAction.type === 'wishlist_nav') {
            window.dispatchEvent(new CustomEvent('auth-success-wishlist', { detail: this.pendingAction }));
        }
        this.pendingAction = null;
      },
      
      reset() {
        this.errors = {};
        this.formData = {
            login: { username: '', password: '', remember: false },
            register: { first_name: '', last_name: '', email: '', password: '', confirm_password: '' }
        };
      }
    });
  });
</script>
